[package]
name = "zkvanguard"
version = "0.4.0"
edition = "2024"
# v0.4.0 — 2026-07-18 — phase 16 OracleCap split for MSafe migration.
# Enables AdminCap → MSafe cold custody by carving out the every-30-min
# NAV attestation into a hot-key OracleCap. See docs/MSAFE_ADMINCAP_MIGRATION.md.
# Changes vs v0.2.0:
#   - New OracleCap struct + admin_mint_oracle_cap (AdminCap-gated one-shot)
#   - New oracle_attest_external_nav entry fn (OracleCap-gated hot path)
#   - admin_attest_external_nav body extracted into attest_external_nav_internal;
#     signature preserved (compatible upgrade), body delegates to helper
#
# v0.2.0 — 2026-06-09 — 13 audit phases, ~44 bugs fixed, billion-dollar
# safety features added. See docs/AUDIT_2026-06-04.md for full details.
# Major changes vs v0.1.0:
#   - External NAV oracle (fixes 2026-06-03 share-math underpayment)
#   - ed25519 prover attestation across 4 ZK contracts
#   - Cap-minting lockdown (prevents persistence escalation)
#   - TVL ceiling (operator-set hard cap on total deposits)
#   - u128 math throughout (no overflow at billion-dollar scale)
#   - Funds-verify on close_hedge (drain prevention)
#   - emergency_withdraw pro-rata cap (FCFS race fix)
#   - Replay protection in zk_verifier (signature-based dedup)
#   - Cross-proxy drain fix in zk_proxy_vault (3 paths)
#   - admin_reset_hedge_state safety guard + recovery semantics
# published-at points to the current on-chain package address. Required for
# `sui client upgrade`; without it the CLI cannot resolve the original
# module address and fails (often misreported as InsufficientGas under
# newer protocol versions). This is the address the UpgradeCap targets.
published-at = "0x9ccbabbdca72c5c0b5d6e01765b578ae37dc33946dd80d6c9b984cd83e598c88"

[dependencies]
Sui = { git = "https://github.com/MystenLabs/sui.git", subdir = "crates/sui-framework/packages/sui-framework", rev = "framework/mainnet" }

[addresses]
zkvanguard = "0x0"
